name: dawndusk
description: 晨夕 - 健康生活习惯养成应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # 路由
  go_router: ^14.0.0

  # 网络请求
  dio: ^5.4.0
  retrofit: ^4.1.0
  json_annotation: ^4.8.0

  # WebSocket
  web_socket_channel: ^2.4.0

  # 本地存储
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 推送通知
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # UI组件
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # 工具库
  intl: ^0.19.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.0
  retrofit_generator: ^8.0.0
  json_serializable: ^6.7.0
  hive_generator: ^2.0.1

  # 测试
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

  # 代码质量
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
